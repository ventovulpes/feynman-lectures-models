<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./index.css" rel="stylesheet">
    <title>Fermat's Principle of Least Time</title>
</head>
<body class="m-4">
    <h1>Fermat's Principle of Least Time</h1>
    <canvas class="canvas" id="canvas"></canvas>
    <br>
    <div class="parameters">
        <div class="row">
            <div>
                <label for="n_a">n<sub>a</sub> = </label>
                <input type="number" id="n_a" min="0.1" step="0.1" value="1" />
            </div>
            <div>
                <label for="n_b">n<sub>b</sub> = </label>
                <input type="number" id="n_b" min="0.1" step="0.1" value="1.3" />
            </div>
        </div>
        <div>
            <label for="drawSpeed">Drawing speed: </label>
            <input type="number" id="drawSpeed" min="0.01" max="3" step="0.1" value="0.1" />
        </div>
        <div>
            <label for="numRays">Number of rays: </label>
            <input type="number" id="numRays" min="5" step="1" value="34" />
        </div>
    </div>
    <br>
    <div class="data">
        <div class="row">
            <div>
                <span>θ<sub>a</sub> = </span>
                <span id="theta_a"> - </span>
                <span>°</span>
            </div>
            <div>
                <span>θ<sub>b</sub> = </span>
                <span id="theta_b"> - </span>
                <span>°</span>
            </div>
        </div>
    </div>
    <p>Click and drag to move the points.</p>
    <p>A simulation showing how Snell's Law can be obtained by selecting the ray which requires the least amount of time to reach its destination.</p>
    <br>
    <label for="graph">Angle θ<sub>a</sub> vs Time Taken</label>
    <br>
    <canvas class="graph" id="graph"></canvas>
    <script src="./draw.js"></script>
    <script src="./main.js"></script>
    <script src="./graph.js"></script>
</body>
</html>
